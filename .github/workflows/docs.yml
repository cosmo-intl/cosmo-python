name: API docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress run.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # PyICU is a C extension; pdoc imports the package, so it needs system ICU.
      - name: Install ICU
        run: sudo apt-get update && sudo apt-get install -y libicu-dev pkg-config

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Build API docs
        run: uv run --extra docs pdoc cosmo -o site

      - uses: actions/upload-pages-artifact@v5
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
